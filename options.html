<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Unlock 设置</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
          "Microsoft YaHei", sans-serif;
        margin: 24px;
        color: #0f172a;
      }
      .row {
        margin-bottom: 12px;
      }
      input {
        width: 120px;
        padding: 8px;
        font-size: 15px;
      }
      select {
        width: 260px;
        padding: 8px;
        font-size: 15px;
      }
      textarea {
        width: 420px;
        min-height: 110px;
        padding: 8px;
        font-size: 14px;
      }
      button {
        padding: 8px 12px;
      }
      #status {
        margin-top: 10px;
        color: #15803d;
      }
    </style>
  </head>
  <body>
    <h2>Word Unlock 设置</h2>
    <p>当累计活跃使用达到设定分钟数后，会弹出答题页。</p>
    <div class="row">
      <label for="limitMinutes">触发时长（分钟）</label>
    </div>
    <div class="row">
      <input id="limitMinutes" type="number" min="1" step="1" />
    </div>
    <div class="row">
      <label for="requiredStreak">解锁需连续答对（N）</label>
    </div>
    <div class="row">
      <input id="requiredStreak" type="number" min="1" step="1" />
    </div>
    <div class="row">
      <label for="selectedBook">词书</label>
    </div>
    <div class="row">
      <select id="selectedBook"></select>
    </div>
    <div class="row">
      <label for="enabledSites">生效网站（每行一个域名，如 douyin.com）</label>
    </div>
    <div class="row">
      <textarea id="enabledSites" placeholder="留空表示所有网站生效"></textarea>
    </div>
    <div class="row">
      <label for="pluginEnabled">
        <input id="pluginEnabled" type="checkbox" />
        启用插件功能
      </label>
    </div>
    <div class="row">
      <label for="resetOnWrong">
        <input id="resetOnWrong" type="checkbox" />
        答错后重置连对计数
      </label>
    </div>
    <div class="row">
      <label for="showCountdown">
        <input id="showCountdown" type="checkbox" />
        显示网页倒计时悬浮条
      </label>
    </div>
    <div class="row">
      <button id="saveBtn" type="button">保存设置</button>
      <button id="openStatsBtn" type="button">打开统计页面</button>
    </div>
    <p id="status"></p>
    <script src="options.js"></script>
  </body>
</html>
